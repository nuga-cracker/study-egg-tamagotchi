<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코딩 병아리 스터디 🐣</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1026;
  --surface: #241535;
  --surface2: #2e1c42;
  --border: #3d2a5a;
  --accent: #c084fc;
  --accent2: #f9a8d4;
  --accent3: #86efac;
  --yellow: #fde68a;
  --text: #f0e6ff;
  --muted: #8b6aad;
  --egg-color: #fff8e7;
  --chick-color: #fde68a;
  --chicken-color: #fb923c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  background-image: radial-gradient(ellipse at 20% 20%, rgba(192,132,252,0.08) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 80%, rgba(249,168,212,0.06) 0%, transparent 60%);
  color: var(--text);
  font-family: 'Jua', sans-serif;
  min-height: 100vh;
  padding: 28px 16px 60px;
}
.container { max-width: 1200px; margin: 0 auto; }

/* HEADER */
header { text-align: center; margin-bottom: 36px; }
.logo { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 4px; color: var(--accent); opacity: 0.7; margin-bottom: 8px; }
h1 { font-size: clamp(24px, 5vw, 42px); line-height: 1.1; margin-bottom: 6px;
  background: linear-gradient(135deg, var(--yellow) 0%, var(--accent2) 50%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.subtitle { color: var(--muted); font-size: 13px; font-family: 'Space Mono', monospace; }

/* PERIOD BAR */
.period-bar {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 14px 22px; margin-bottom: 22px; gap: 12px; flex-wrap: wrap;
}
.period-left { display: flex; align-items: center; gap: 12px; }
.period-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; }
.period-dates { font-size: 14px; font-weight: bold; color: var(--accent3); }
.day-badge { background: var(--accent); color: #fff; font-family: 'Space Mono', monospace; font-size: 10px; padding: 3px 9px; border-radius: 20px; font-weight: 700; }
.period-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ADD MEMBER */
.add-bar { display: flex; gap: 10px; margin-bottom: 22px; }
.add-bar input {
  flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 10px 16px; color: var(--text); font-family: 'Jua', sans-serif; font-size: 15px; outline: none;
  transition: border-color 0.2s;
}
.add-bar input:focus { border-color: var(--accent); }
.add-bar input::placeholder { color: var(--muted); }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 5px; padding: 9px 16px;
  border-radius: 12px; font-family: 'Jua', sans-serif; font-size: 14px;
  cursor: pointer; border: none; transition: all 0.18s; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #d8b4fe; transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); color: var(--text); }
.btn-sm { padding: 5px 11px; font-size: 12px; }

/* STATS */
.stats-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; display: flex; align-items: center; gap: 7px; }
.stat-num { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--muted); }

/* EVOLUTION LEGEND */
.evo-legend {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 16px 22px; margin-bottom: 28px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.evo-legend-title { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-right: 8px; }
.evo-item { display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 20px; font-size: 13px; }
.evo-item.egg-stage { background: rgba(255,248,231,0.1); border: 1px solid rgba(255,248,231,0.2); }
.evo-item.chick-stage { background: rgba(253,230,138,0.12); border: 1px solid rgba(253,230,138,0.25); }
.evo-item.chicken-stage { background: rgba(251,146,60,0.12); border: 1px solid rgba(251,146,60,0.25); }
.evo-arrow { color: var(--muted); font-size: 16px; }

/* MEMBER GRID */
.member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; margin-bottom: 36px; }
.member-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
  padding: 22px; position: relative; overflow: hidden; transition: border-color 0.2s;
}
.member-card:hover { border-color: var(--accent); }
.member-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: 20px 20px 0 0;
}
.member-card.stage-egg::before { background: linear-gradient(90deg, #fff8e7, #fde68a); }
.member-card.stage-chick::before { background: linear-gradient(90deg, #fde68a, #fb923c); }
.member-card.stage-chicken::before { background: linear-gradient(90deg, #fb923c, #f97316); }

/* CHARACTER DISPLAY */
.card-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
.char-wrap {
  width: 88px; height: 88px; flex-shrink: 0; border-radius: 16px;
  background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center;
  position: relative; overflow: visible;
}
.char-wrap svg { width: 80px; height: 80px; overflow: visible; }

/* ── CHARACTER ANIMATIONS ── */

/* 알: 좌우 뒤뚱 + 위아래 바운스 (배틀 대기) */
@keyframes egg-wobble {
  0%   { transform: rotate(0deg)   translateY(0px);   }
  12%  { transform: rotate(-6deg)  translateY(-2px);  }
  25%  { transform: rotate(0deg)   translateY(-4px);  }
  37%  { transform: rotate(6deg)   translateY(-2px);  }
  50%  { transform: rotate(0deg)   translateY(0px);   }
  62%  { transform: rotate(-5deg)  translateY(-1px);  }
  75%  { transform: rotate(0deg)   translateY(-3px);  }
  87%  { transform: rotate(5deg)   translateY(-1px);  }
  100% { transform: rotate(0deg)   translateY(0px);   }
}

/* 병아리: 좌우 스웨이 + 통통 바운스 (스쿼시&스트레치) */
@keyframes chick-sway {
  0%   { transform: rotate(0deg)   translateY(0px)  scaleX(1)    scaleY(1);    }
  10%  { transform: rotate(-7deg)  translateY(-2px) scaleX(1.05) scaleY(0.95); }
  20%  { transform: rotate(-4deg)  translateY(-6px) scaleX(0.96) scaleY(1.06); }
  35%  { transform: rotate(6deg)   translateY(-8px) scaleX(1.04) scaleY(0.96); }
  50%  { transform: rotate(0deg)   translateY(0px)  scaleX(0.95) scaleY(1.06); }
  65%  { transform: rotate(-5deg)  translateY(-5px) scaleX(1.03) scaleY(0.97); }
  80%  { transform: rotate(4deg)   translateY(-3px) scaleX(0.98) scaleY(1.03); }
  100% { transform: rotate(0deg)   translateY(0px)  scaleX(1)    scaleY(1);    }
}

/* 닭: 씩씩한 스트럿 — 크게 흔들고 묵직하게 착지 */
@keyframes chicken-strut {
  0%   { transform: rotate(0deg)   translateY(0px)   scaleX(1)    scaleY(1);    }
  8%   { transform: rotate(-8deg)  translateY(-3px)  scaleX(1.06) scaleY(0.94); }
  18%  { transform: rotate(-4deg)  translateY(-10px) scaleX(0.94) scaleY(1.08); }
  30%  { transform: rotate(7deg)   translateY(-12px) scaleX(1.05) scaleY(0.95); }
  42%  { transform: rotate(3deg)   translateY(-4px)  scaleX(0.96) scaleY(1.05); }
  50%  { transform: rotate(0deg)   translateY(0px)   scaleX(0.93) scaleY(1.08); }
  60%  { transform: rotate(-6deg)  translateY(-7px)  scaleX(1.04) scaleY(0.96); }
  75%  { transform: rotate(5deg)   translateY(-9px)  scaleX(0.96) scaleY(1.04); }
  88%  { transform: rotate(-3deg)  translateY(-2px)  scaleX(1.02) scaleY(0.98); }
  100% { transform: rotate(0deg)   translateY(0px)   scaleX(1)    scaleY(1);    }
}

/* 눈 깜빡임 */
@keyframes blink {
  0%,88%,100% { transform: scaleY(1);    }
  93%          { transform: scaleY(0.06); }
  96%          { transform: scaleY(1);    }
}

/* 날개/팔 퍼덕 — 어깨 기준으로 위아래 교대 */
@keyframes flap-l {
  0%,100% { transform: rotate(0deg);   }
  30%     { transform: rotate(-20deg); }
  60%     { transform: rotate(5deg);   }
}
@keyframes flap-r {
  0%,100% { transform: rotate(0deg);  }
  30%     { transform: rotate(20deg); }
  60%     { transform: rotate(-5deg); }
}

/* 커서 깜빡임 */
@keyframes cursor-blink {
  0%,49%  { opacity: 1; }
  50%,100%{ opacity: 0; }
}

/* 그림자 펄스 (점프할 때 작아짐) */
@keyframes shadow-egg {
  0%,100% { transform: scaleX(1);    opacity: .10; }
  37%     { transform: scaleX(0.65); opacity: .05; }
}
@keyframes shadow-chick {
  0%,100% { transform: scaleX(1);    opacity: .10; }
  20%     { transform: scaleX(0.6);  opacity: .04; }
  50%     { transform: scaleX(0.5);  opacity: .03; }
}
@keyframes shadow-chicken {
  0%,100% { transform: scaleX(1);    opacity: .12; }
  18%     { transform: scaleX(0.5);  opacity: .03; }
  30%     { transform: scaleX(0.42); opacity: .03; }
}

/* Apply */
.member-card.stage-egg     .char-wrap svg { animation: egg-wobble   2.8s ease-in-out infinite; transform-origin: 50% 90%; }
.member-card.stage-chick   .char-wrap svg { animation: chick-sway   1.9s ease-in-out infinite; transform-origin: 50% 90%; }
.member-card.stage-chicken .char-wrap svg { animation: chicken-strut 1.5s ease-in-out infinite; transform-origin: 50% 90%; }

.member-card.stage-egg     .shadow-el { animation: shadow-egg     2.8s ease-in-out infinite; transform-origin: center; }
.member-card.stage-chick   .shadow-el { animation: shadow-chick   1.9s ease-in-out infinite; transform-origin: center; }
.member-card.stage-chicken .shadow-el { animation: shadow-chicken 1.5s ease-in-out infinite; transform-origin: center; }

.eye-group { animation: blink 3.5s ease-in-out infinite; transform-origin: center; }
.wing-l    { animation: flap-l 1.1s ease-in-out infinite;       transform-origin: 80% 30%; }
.wing-r    { animation: flap-r 1.1s ease-in-out infinite 0.55s; transform-origin: 20% 30%; }
.cursor-el { animation: cursor-blink 0.85s step-end infinite; }

/* Card info */
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 18px; font-weight: bold; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stage-badge {
  display: inline-block; font-size: 11px; padding: 2px 10px; border-radius: 20px; margin-bottom: 8px;
  font-family: 'Space Mono', monospace;
}
.stage-badge.egg { background: rgba(255,248,231,0.15); color: #fde68a; }
.stage-badge.chick { background: rgba(253,230,138,0.15); color: #fb923c; }
.stage-badge.chicken { background: rgba(251,146,60,0.15); color: #f97316; }

/* Progress */
.progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.progress-bar-bg { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s cubic-bezier(.34,1.56,.64,1); }
.progress-num { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); white-space: nowrap; }

/* Day dots grid */
.day-dots { display: grid; grid-template-columns: repeat(15, 1fr); gap: 4px; margin-top: 14px; }
.day-dot {
  aspect-ratio: 1; border-radius: 50%; cursor: pointer; border: 1.5px solid var(--border);
  background: transparent; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  font-size: 8px; color: transparent; position: relative;
}
.day-dot:hover:not(.future) { border-color: var(--accent3); background: rgba(134,239,172,0.1); }
.day-dot.checked { background: var(--accent3); border-color: var(--accent3); color: #1a2e1a; }
.day-dot.today-dot { border-color: var(--accent); }
.day-dot.future { opacity: 0.22; cursor: not-allowed; }
.day-dot::after { content: attr(data-day); font-family: 'Space Mono', monospace; font-size: 7px; color: var(--muted); position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%); white-space: nowrap; }

/* Day number row */
.dot-labels { display: grid; grid-template-columns: repeat(15, 1fr); gap: 4px; margin-top: 18px; }
.dot-label { font-family: 'Space Mono', monospace; font-size: 7px; color: var(--muted); text-align: center; }
.dot-label.today-lbl { color: var(--accent); font-weight: bold; }

/* Card footer */
.card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
.xp-text { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
.xp-text span { color: var(--accent); }

/* Empty */
.empty-state { text-align: center; padding: 60px; color: var(--muted); grid-column: 1/-1; }
.empty-icon { font-size: 52px; margin-bottom: 14px; }

/* CHECKLIST TABLE (bottom) */
.section-title { font-size: 16px; margin-bottom: 14px; color: var(--muted); }
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 700px; }
thead tr { background: var(--surface2); }
th { padding: 12px 8px; font-size: 10px; letter-spacing: 1px; color: var(--muted); text-align: center; white-space: nowrap; border-bottom: 1px solid var(--border); font-family: 'Space Mono', monospace; }
th.name-col { text-align: left; padding-left: 20px; min-width: 120px; }
th.today-th { color: var(--accent); }
td { padding: 8px 6px; text-align: center; border-bottom: 1px solid rgba(61,42,90,0.4); vertical-align: middle; }
td.name-td { text-align: left; padding-left: 20px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(192,132,252,0.04); }

.tbl-check {
  width: 28px; height: 28px; border-radius: 7px; border: 1.5px solid var(--border);
  background: transparent; cursor: pointer; display: inline-flex; align-items: center;
  justify-content: center; font-size: 12px; color: transparent; transition: all 0.14s;
}
.tbl-check:hover:not(.tbl-future) { border-color: var(--accent3); background: rgba(134,239,172,0.1); }
.tbl-check.tbl-checked { background: rgba(134,239,172,0.15); border-color: var(--accent3); color: var(--accent3); }
.tbl-check.tbl-future { opacity: 0.2; cursor: not-allowed; }
.tbl-check.tbl-today { border-color: rgba(192,132,252,0.5); }
.tbl-name { display: flex; align-items: center; gap: 8px; }
.tbl-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; flex-shrink: 0; }

/* MODALS */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(6px); animation: fadeIn 0.2s; }
.modal { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 28px; width: 90%; max-width: 400px; animation: slideUp 0.2s; }
.modal h2 { font-size: 18px; margin-bottom: 8px; }
.modal p { color: var(--muted); font-size: 13px; margin-bottom: 20px; font-family: 'Space Mono', monospace; line-height: 1.6; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal input { width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; margin-bottom: 18px; outline: none; font-family: 'Jua', sans-serif; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

/* LEVEL UP flash */
@keyframes levelUp { 0%{transform:scale(1)} 30%{transform:scale(1.06)} 60%{transform:scale(0.98)} 100%{transform:scale(1)} }
.leveled-up { animation: levelUp 0.5s ease; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media(max-width:600px){ .stats-row{grid-template-columns:repeat(2,1fr);} .period-bar{flex-direction:column;align-items:flex-start;} }
</style>
</head>
<body>
<div class="container">

<header>
  <div class="logo">✦ TAMAGOTCHI STUDY TRACKER ✦</div>
  <h1>코딩 병아리 키우기 🐣</h1>
  <p class="subtitle">매일 공부하면 캐릭터가 진화해요!</p>
</header>

<!-- Period bar -->
<div class="period-bar">
  <div class="period-left">
    <span class="period-label">PERIOD</span>
    <span class="period-dates" id="periodDates">—</span>
    <span class="day-badge" id="dayCount">D-?</span>
  </div>
  <div class="period-actions">
    <button class="btn btn-ghost btn-sm" onclick="openStartModal()">📅 시작일 변경</button>
    <button class="btn btn-ghost btn-sm" onclick="openResetModal()">🔄 초기화</button>
  </div>
</div>

<!-- Add member -->
<div class="add-bar">
  <input type="text" id="memberInput" placeholder="스터디 멤버 이름 입력 후 Enter ↵" maxlength="12"
    onkeydown="if(event.key==='Enter') addMember()">
  <button class="btn btn-primary" onclick="addMember()">＋ 추가</button>
</div>

<!-- Stats -->
<div class="stats-row" id="statsRow"></div>

<!-- Evolution legend -->
<div class="evo-legend">
  <span class="evo-legend-title">EVOLUTION</span>
  <div class="evo-item egg-stage">🥚 알 (0~4회)</div>
  <span class="evo-arrow">→</span>
  <div class="evo-item chick-stage">🐣 병아리 (5~10회)</div>
  <span class="evo-arrow">→</span>
  <div class="evo-item chicken-stage">🐔 닭 (11~15회)</div>
</div>

<!-- Member cards -->
<div class="member-grid" id="memberGrid"></div>

<!-- Full check table -->
<div class="section-title">📋 전체 체크 현황</div>
<div class="table-wrap">
  <table>
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

</div><!-- /container -->

<!-- Modals -->
<div class="modal-overlay" id="resetModal" style="display:none">
  <div class="modal">
    <h2>🔄 기간 초기화</h2>
    <p>모든 체크 기록이 삭제되고 오늘부터 새 15일이 시작됩니다. 멤버 목록은 유지돼요.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('resetModal')">취소</button>
      <button class="btn btn-primary" style="background:#f87171" onclick="resetPeriod()">초기화</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="startModal" style="display:none">
  <div class="modal">
    <h2>📅 시작일 설정</h2>
    <p>15일 챌린지의 시작일을 선택하세요.</p>
    <input type="date" id="startDateInput">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('startModal')">취소</button>
      <button class="btn btn-primary" onclick="applyStartDate()">적용</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="deleteModal" style="display:none">
  <div class="modal">
    <h2>🗑️ 멤버 삭제</h2>
    <p id="deleteModalText"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('deleteModal')">취소</button>
      <button class="btn btn-primary" style="background:#f87171" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<script>
// ─── SVG CHARACTERS ───────────────────────────────────────────────────────────

function svgEgg() {
  return `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <!-- shadow -->
    <ellipse class="shadow-el" cx="40" cy="76" rx="14" ry="3" fill="#000" opacity="0.1"/>
    <!-- egg body -->
    <ellipse cx="40" cy="46" rx="22" ry="26" fill="#fff8e7" stroke="#f5d482" stroke-width="1.5"/>
    <!-- inner glow hint -->
    <ellipse cx="40" cy="50" rx="16" ry="19" fill="#fffbf0" opacity="0.6"/>
    <!-- crack lines -->
    <path d="M35 34 L37.5 38 L33.5 42.5 L36.5 46.5" fill="none" stroke="#f5d482" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

// ─── STATE ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'chickStudy_v1';
let state = loadState();
let pendingDeleteId = null;

const AVATAR_COLORS = ['#c084fc','#f9a8d4','#86efac','#7dd3fc','#fcd34d','#fb923c','#a5b4fc','#6ee7b7'];

function loadState() {
  try { const r = localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); } catch(e){}
  return { startDate: todayStr(), members: [], checks: {} };
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function todayStr() { return new Date().toISOString().slice(0,10); }

function getDays() {
  const s = new Date(state.startDate);
  return Array.from({length:15},(_,i)=>{ const d=new Date(s); d.setDate(d.getDate()+i); return d.toISOString().slice(0,10); });
}
function fmtDate(ds) { const d=new Date(ds); return `${d.getMonth()+1}/${d.getDate()}`; }
function getDOW(ds) { return ['일','월','화','수','목','금','토'][new Date(ds).getDay()]; }
function getCount(id) { const days=getDays(), c=state.checks[id]||{}; return days.filter(d=>c[d]).length; }

function getStage(count) {
  if (count <= 4) return 'egg';
  if (count <= 10) return 'chick';
  return 'chicken';
}
function getStageName(stage) { return {egg:'🥚 알',chick:'🐣 병아리',chicken:'🐔 닭'}[stage]; }
function getStageClass(stage) { return {egg:'stage-egg',chick:'stage-chick',chicken:'stage-chicken'}[stage]; }
function getProgressColor(count) {
  if (count <= 4) return '#fde68a';
  if (count <= 10) return '#fb923c';
  return '#86efac';
}

function addMember() {
  const inp = document.getElementById('memberInput');
  const name = inp.value.trim();
  if (!name) return;
  if (state.members.find(m=>m.name===name)) { alert('이미 있는 멤버예요!'); return; }
  const id = 'M' + Date.now();
  const colorIdx = state.members.length % AVATAR_COLORS.length;
  state.members.push({id, name, colorIdx});
  saveState(); inp.value = ''; render();
}

function openDeleteModal(id) {
  const m = state.members.find(m=>m.id===id);
  pendingDeleteId = id;
  document.getElementById('deleteModalText').textContent = `"${m.name}"을(를) 삭제하면 모든 기록이 사라져요.`;
  document.getElementById('deleteModal').style.display = 'flex';
}
function confirmDelete() {
  if (!pendingDeleteId) return;
  state.members = state.members.filter(m=>m.id!==pendingDeleteId);
  delete state.checks[pendingDeleteId];
  saveState(); pendingDeleteId=null; closeModal('deleteModal'); render();
}

function toggleCheck(memberId, dateStr, fromCard) {
  const days = getDays();
  if (!days.includes(dateStr)) return;
  const oldStage = getStage(getCount(memberId));
  if (!state.checks[memberId]) state.checks[memberId] = {};
  state.checks[memberId][dateStr] = !state.checks[memberId][dateStr];
  const newStage = getStage(getCount(memberId));
  saveState();
  if (newStage !== oldStage) {
    render();
    const card = document.getElementById('card_' + memberId);
    if (card) { card.classList.add('leveled-up'); setTimeout(()=>card.classList.remove('leveled-up'),500); }
  } else { render(); }
}

function render() {
  renderPeriod(); renderStats(); renderCards(); renderTable();
}

function renderPeriod() {
  const days = getDays(); const today = todayStr();
  document.getElementById('periodDates').textContent = `${fmtDate(days[0])} — ${fmtDate(days[14])}`;
  const idx = days.indexOf(today);
  if (idx < 0) {
    document.getElementById('dayCount').textContent = today < days[0] ? '시작 전' : '완료';
  } else {
    document.getElementById('dayCount').textContent = `D+${idx+1}`;
  }
}

function renderStats() {
  const days = getDays(); const today = todayStr();
  const todayIdx = days.indexOf(today);
  const passed = todayIdx >= 0 ? todayIdx+1 : (today > days[14] ? 15 : 0);
  const total = state.members.reduce((s,m)=>s+getCount(m.id),0);
  const maxPoss = state.members.length * 15;
  const rate = maxPoss > 0 ? Math.round(total/maxPoss*100) : 0;
  const eggs = state.members.filter(m=>getStage(getCount(m.id))==='egg').length;
  const chicks = state.members.filter(m=>getStage(getCount(m.id))==='chick').length;
  const chickens = state.members.filter(m=>getStage(getCount(m.id))==='chicken').length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${state.members.length}</div><div class="stat-lbl">멤버 수</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent3)">${passed}<span style="font-size:13px;opacity:0.5">/15</span></div><div class="stat-lbl">진행 일수</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent2)">${rate}%</div><div class="stat-lbl">전체 달성률</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#fde68a">${eggs}</div><div class="stat-lbl">🥚 알</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#fb923c">${chicks}</div><div class="stat-lbl">🐣 병아리</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#86efac">${chickens}</div><div class="stat-lbl">🐔 닭</div></div>
  `;
}

function renderCards() {
  const days = getDays(); const today = todayStr();
  const grid = document.getElementById('memberGrid');

  if (state.members.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🥚</div><p>멤버를 추가해서 병아리를 깨어나게 해보세요!</p></div>`;
    return;
  }

  const sorted = [...state.members].sort((a,b)=>getCount(b.id)-getCount(a.id));
  grid.innerHTML = sorted.map(member => {
    const count = getCount(member.id);
    const stage = getStage(count);
    const pct = Math.round(count/15*100);
    const fillColor = getProgressColor(count);
    const color = AVATAR_COLORS[member.colorIdx];
    const checks = state.checks[member.id] || {};
    const stageClass = getStageClass(stage);
    const stageName = getStageName(stage);
    const stageBadgeClass = {egg:'egg',chick:'chick',chicken:'chicken'}[stage];

    // Character SVG
    let charSvg = '';
    if (stage === 'egg') charSvg = svgEgg();
    else if (stage === 'chick') charSvg = svgChick(color);
    else charSvg = svgChicken();

    // Day dots
    const dots = days.map((d,i) => {
      const done = !!checks[d];
      const isToday = d === today;
      let cls = 'day-dot';
      if (done) cls += ' checked';
      if (isToday) cls += ' today-dot';
      return `<div class="${cls}" title="Day ${i+1}: ${d}" onclick="toggleCheck('${member.id}','${d}',true)">${done ? '✓' : ''}</div>`;
    }).join('');

    const dayLabels = days.map((d,i) => {
      const isToday = d === today;
      return `<div class="dot-label${isToday?' today-lbl':''}">${i+1}</div>`;
    }).join('');

    // XP message
    const nextStage = stage === 'egg' ? `알→병아리까지 ${5-count}회` : stage === 'chick' ? `병아리→닭까지 ${11-count}회` : '최종 진화 완료! 🎓';

    return `
    <div class="member-card ${stageClass}" id="card_${member.id}">
      <div class="card-top">
        <div class="char-wrap">${charSvg}</div>
        <div class="card-info">
          <div class="card-name">${escHtml(member.name)}</div>
          <div class="stage-badge ${stageBadgeClass}">${stageName}</div>
          <div class="progress-row">
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" style="width:${pct}%;background:${fillColor}"></div>
            </div>
            <span class="progress-num">${count}/15</span>
          </div>
        </div>
      </div>
      <div class="day-dots">${dots}</div>
      <div class="dot-labels">${dayLabels}</div>
      <div class="card-footer">
        <span class="xp-text">다음 → <span>${nextStage}</span></span>
        <button class="btn btn-ghost btn-sm" style="color:#f87171;border-color:rgba(248,113,113,0.3)"
          onclick="openDeleteModal('${member.id}')">삭제</button>
      </div>
    </div>`;
  }).join('');
}

function renderTable() {
  const days = getDays(); const today = todayStr();

  // Head
  let hh = `<tr><th class="name-col">멤버</th>`;
  days.forEach((d,i) => {
    const isToday = d === today;
    hh += `<th class="${isToday?'today-th':''}" title="${d}"><div>${fmtDate(d)}</div><div style="font-size:8px;opacity:0.5">${getDOW(d)}</div></th>`;
  });
  hh += `<th>달성</th><th>단계</th></tr>`;
  document.getElementById('tableHead').innerHTML = hh;

  if (state.members.length === 0) {
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="${days.length+3}" style="padding:40px;text-align:center;color:var(--muted)">멤버를 추가해주세요 🥚</td></tr>`;
    return;
  }

  const sorted = [...state.members].sort((a,b)=>getCount(b.id)-getCount(a.id));
  document.getElementById('tableBody').innerHTML = sorted.map(member => {
    const checks = state.checks[member.id] || {};
    const count = getCount(member.id);
    const stage = getStage(count);
    const stageName = getStageName(stage);
    const color = AVATAR_COLORS[member.colorIdx];
    const initial = member.name.charAt(0);
    const pct = Math.round(count/15*100);
    const fillColor = getProgressColor(count);

    let row = `<tr><td class="name-td">
      <div class="tbl-name">
        <div class="tbl-avatar" style="background:${color};color:#fff">${initial}</div>
        <span style="font-size:14px">${escHtml(member.name)}</span>
      </div></td>`;

    days.forEach(d => {
      const done = !!checks[d];
      const isToday = d === today;
      let cls = 'tbl-check';
      if (done) cls += ' tbl-checked';
      if (isToday) cls += ' tbl-today';
      row += `<td><button class="${cls}" onclick="toggleCheck('${member.id}','${d}',false)">${done?'✓':''}</button></td>`;
    });

    row += `<td>
      <div style="display:flex;align-items:center;gap:6px;min-width:70px">
        <div class="progress-bar-bg" style="flex:1">
          <div class="progress-bar-fill" style="width:${pct}%;background:${fillColor}"></div>
        </div>
        <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">${count}/15</span>
      </div>
    </td>
    <td style="font-size:12px;white-space:nowrap">${stageName}</td>
    </tr>`;
    return row;
  }).join('');
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Modal helpers
function openResetModal(){ document.getElementById('resetModal').style.display='flex'; }
function openStartModal(){ document.getElementById('startDateInput').value=state.startDate; document.getElementById('startModal').style.display='flex'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }
function resetPeriod(){ state.startDate=todayStr(); state.checks={}; saveState(); closeModal('resetModal'); render(); }
function applyStartDate(){ const v=document.getElementById('startDateInput').value; if(!v)return; state.startDate=v; saveState(); closeModal('startModal'); render(); }

['resetModal','startModal','deleteModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click', function(e){ if(e.target===this) closeModal(id); });
});

render();
</script>
</body>
</html>
